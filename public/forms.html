<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlify Forms Hook</title>
</head>
<body>
    <!-- Form untuk External Enquiry -->
    <form name="contact-external" data-netlify="true" hidden>
        <input type="text" name="name" />
        <input type="email" name="email" />
        <input type="tel" name="phone" />
        <input type="text" name="enquiry" />
        <input type="text" name="subject" />
        <textarea name="message"></textarea>
    </form>

    <!-- Form untuk Media Partnership -->
    <form name="contact-media" data-netlify="true" hidden>
        <input type="text" name="name" />
        <input type="email" name="email" />
        <input type="tel" name="phone" />
        <input type="text" name="enquiry" />
        <input type="text" name="subject" />
        <textarea name="message"></textarea>
    </form>
</body>
</html>
